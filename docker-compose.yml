version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: course_bot_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-course_management}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: course_bot_web
    restart: always
    expose:
      - "8080"
    ports:
      - "8000:8080"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-course_management}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=web,localhost,127.0.0.1
      - BOT_API_KEY=${BOT_API_KEY}
    depends_on:
      - db
    volumes:
      - ./django_backend/media:/app/django_backend/media

  bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: course_bot_telegram
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DJANGO_API_BASE_URL=http://web:8080/api
      - BOT_API_KEY=${BOT_API_KEY}
    depends_on:
      - web
    volumes:
      - bot_data:/app

volumes:
  mysql_data:
  bot_data:
